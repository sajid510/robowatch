name: RoboWatch AI — Weekly Intelligence Report

on:
  schedule:
    - cron: '0 8 * * 5'   # Every Friday 8:00 AM UTC = 2:00 PM BST
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  run-robowatch:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: robowatch-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: robowatch-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RoboWatch AI Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m src.main
